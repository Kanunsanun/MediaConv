name: build-installer

# v1.0 のようなタグを push すると setup.exe を自動ビルドして Releases に公開する。
# 手動実行（workflow_dispatch）も可能。成果物は Actions の Artifacts からも取得できる。
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write          # Release 作成・アセット添付に必要

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 依存ライブラリを導入
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: ffmpeg を取得して bin\ に配置
        shell: pwsh
        run: |
          $url = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_tmp -Force
          $exe = Get-ChildItem ffmpeg_tmp -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          New-Item -ItemType Directory -Force -Path bin | Out-Null
          Copy-Item $exe.FullName bin\ffmpeg.exe -Force
          Write-Host "ffmpeg placed:"; Get-Item bin\ffmpeg.exe | Select-Object Length

      - name: PyInstaller でアプリをビルド
        run: pyinstaller mediaconv.spec --noconfirm

      - name: Inno Setup を導入
        run: choco install innosetup -y --no-progress

      - name: setup.exe を生成
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
          Get-ChildItem Output

      - name: 成果物をアップロード（Artifacts）
        uses: actions/upload-artifact@v4
        with:
          name: MediaConv-setup
          path: Output/*.exe

      - name: Release に添付（タグ push 時のみ）
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Output/*.exe
          generate_release_notes: true
